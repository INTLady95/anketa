<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Анкета · Tatsiana Zhukavets</title>
<style>
  /* ===== TWILIGHT INDIGO (default dark, blue-violet) ===== */
  :root{
    --bg:#181633; --bg-deep:#221e48; --bg-alt:#1d1a3c;
    --ink:#ece9ff; --ink-soft:#c9c3ec; --muted:#948dbb;
    --gold:#f5c15c; --gold-deep:#c9922c; --accent-soft:#ffd98a;
    --cyan:#34e5ff; --violet:#a78bfa;
    --field-bg:rgba(13,11,32,.55); --field-border:rgba(255,255,255,.12);
    --card-a:rgba(42,38,88,.96); --card-b:rgba(33,29,70,.96);
    --line:rgba(245,193,92,.20); --line-soft:rgba(167,139,250,.22);
    --drawer-bg:rgba(28,25,60,.98);
    --glow:radial-gradient(1200px 600px at 12% -8%, rgba(124,58,237,.28), transparent 60%),
           radial-gradient(900px 500px at 100% 0%, rgba(70,110,255,.14), transparent 55%);
    --shadow:0 20px 50px -30px rgba(0,0,0,.7);
    --shine:linear-gradient(100deg,#c9922c,#f5c15c,#fff3d6,#ffe9b0,#f5c15c,#c9922c);
    --radius:16px;
  }
  /* ===== LIGHT — KAUN GOLD ===== */
  body.light{
    --bg:#eadfc4; --bg-deep:#f4ead2; --bg-alt:#e0d1ac;
    --ink:#3a2c12; --ink-soft:#6b5834; --muted:#94805a;
    --gold:#9c6b10; --gold-deep:#75500a; --accent-soft:#b98a2a;
    --cyan:#0e7d8f; --violet:#7d54c9;
    --field-bg:rgba(255,252,245,.75); --field-border:rgba(124,84,12,.28);
    --card-a:rgba(255,251,243,.96); --card-b:rgba(244,234,210,.96);
    --line:rgba(124,84,12,.26); --line-soft:rgba(124,84,12,.15);
    --drawer-bg:rgba(245,237,218,.98);
    --glow:radial-gradient(1100px 560px at 12% -8%, rgba(217,180,94,.35), transparent 60%),
           radial-gradient(900px 500px at 100% 0%, rgba(176,138,224,.12), transparent 55%);
    --shadow:0 20px 44px -28px rgba(124,84,12,.5);
    --shine:linear-gradient(100deg,#5f470c,#9c6b10,#c99a34,#e6cf7a,#c99a34,#9c6b10,#5f470c);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0; background:var(--glow), var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    line-height:1.55; -webkit-font-smoothing:antialiased; transition:background .4s, color .4s;
  }
  ::selection{background:rgba(245,193,92,.28)}
  #starfield{position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:1; transition:opacity .5s}
  body.light #starfield{opacity:0}

  /* thin progress bar only (no chips) */
  #progress-wrap{position:sticky; top:0; z-index:30; height:4px; background:rgba(128,128,128,.18)}
  #progress{height:100%; width:0%; background:linear-gradient(90deg,var(--gold),var(--accent-soft),var(--cyan)); transition:width .3s ease}

  /* floating controls: theme + langs */
  #controls{position:fixed; top:14px; right:14px; z-index:40; display:flex; gap:6px; align-items:center}
  #controls .grp{display:flex; gap:2px; background:var(--card-a); border:1px solid var(--line-soft);
    border-radius:999px; padding:3px; box-shadow:var(--shadow)}
  .langbtn{font:inherit; font-size:.74rem; font-weight:600; letter-spacing:.03em; color:var(--muted);
    background:none; border:none; cursor:pointer; padding:5px 10px; border-radius:999px; transition:.2s}
  .langbtn:hover{color:var(--ink)}
  .langbtn.active{background:linear-gradient(180deg,var(--accent-soft),var(--gold)); color:#1a1206}
  #theme-btn{font-size:1rem; width:34px; height:34px; border-radius:999px; cursor:pointer; line-height:1;
    color:var(--ink); background:var(--card-a); border:1px solid var(--line-soft); box-shadow:var(--shadow); transition:.2s}
  #theme-btn:hover{border-color:var(--gold)}

  /* ===== side drawer nav ===== */
  #menu-btn{position:fixed; left:16px; bottom:16px; z-index:45; display:flex; align-items:center; gap:8px;
    font:inherit; font-size:.9rem; font-weight:600; color:#1a1206; cursor:pointer;
    background:linear-gradient(180deg,var(--accent-soft),var(--gold)); border:none;
    padding:12px 18px 12px 16px; border-radius:999px; box-shadow:0 14px 30px -10px rgba(0,0,0,.55); transition:transform .15s}
  #menu-btn:hover{transform:translateY(-2px)}
  #menu-btn .ico{font-size:1.1rem; line-height:1}
  #drawer-backdrop{position:fixed; inset:0; z-index:48; background:rgba(2,1,8,.55); backdrop-filter:blur(3px);
    opacity:0; visibility:hidden; transition:opacity .28s, visibility .28s}
  #drawer-backdrop.open{opacity:1; visibility:visible}
  #drawer{position:fixed; top:0; left:0; bottom:0; z-index:49; width:min(82vw,290px);
    background:var(--drawer-bg); border-right:1px solid var(--line); box-shadow:24px 0 60px -30px rgba(0,0,0,.9);
    transform:translateX(-100%); transition:transform .3s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column;
    backdrop-filter:blur(16px)}
  #drawer.open{transform:translateX(0)}
  #drawer-head{padding:22px 22px 14px; border-bottom:1px solid var(--line-soft)}
  #drawer-head .dt{font-family:Georgia,serif; font-size:1.05rem; color:var(--gold); margin:0}
  #drawer-head .dp{font-size:.8rem; color:var(--muted); margin:6px 0 0}
  #drawer-nav{flex:1; overflow-y:auto; padding:12px 12px 22px}
  .navlink{display:flex; align-items:center; gap:12px; width:100%; text-align:left; font:inherit; font-size:.95rem;
    color:var(--ink-soft); background:none; border:none; cursor:pointer; padding:11px 12px; border-radius:11px; transition:.18s}
  .navlink:hover{background:var(--field-bg); color:var(--ink)}
  .navlink.active{background:linear-gradient(90deg,color-mix(in srgb,var(--gold) 22%,transparent),transparent); color:var(--ink)}
  .navnum{flex:none; width:26px; height:26px; border-radius:8px; display:grid; place-items:center; font-size:.82rem; font-weight:700;
    color:var(--bg); background:linear-gradient(180deg,var(--accent-soft),var(--gold-deep))}
  #drawer-close{position:absolute; top:14px; right:14px; width:32px; height:32px; border-radius:999px; cursor:pointer;
    background:var(--field-bg); border:1px solid var(--field-border); color:var(--ink); font-size:1rem; line-height:1}

  .wrap{max-width:760px; margin:0 auto; padding:40px 22px 120px}
  header.hero{text-align:center; margin-bottom:8px}
  .kicker{font-size:.72rem; letter-spacing:.32em; text-transform:uppercase; color:var(--gold);
    display:inline-block; padding:6px 16px; border:1px solid var(--line); border-radius:999px; margin-bottom:20px}
  h1{font-family:Georgia,"Times New Roman",serif; font-weight:500; font-size:clamp(2rem,6vw,3rem);
    margin:.1em 0 .3em; letter-spacing:.01em;
    background:var(--shine); background-size:200% auto;
    -webkit-background-clip:text; background-clip:text; color:transparent;
    animation:shine 6s linear infinite}
  @keyframes shine{to{background-position:200% center}}
  @media (prefers-reduced-motion: reduce){ h1{animation:none} }
  .lede{color:var(--ink-soft); font-size:1.02rem; max-width:58ch; margin:0 auto}
  .hint{color:var(--muted); font-size:.9rem; margin-top:14px}
  .hint b{color:var(--gold)}

  section.card{background:linear-gradient(180deg,var(--card-a),var(--card-b));
    border:1px solid var(--line-soft); border-radius:var(--radius);
    padding:26px 24px; margin-top:22px; box-shadow:var(--shadow); scroll-margin-top:70px}
  section.card.hidden{display:none}
  .sec-head{display:flex; align-items:center; gap:12px; margin:-2px 0 4px; flex-wrap:wrap}
  .sec-num{font-family:Georgia,serif; font-size:1rem; color:var(--bg);
    background:linear-gradient(180deg,var(--accent-soft),var(--gold-deep));
    width:30px; height:30px; border-radius:9px; display:grid; place-items:center; flex:none; font-weight:700}
  .sec-head h2{font-size:1.16rem; margin:0; font-weight:600}
  .sec-desc{color:var(--muted); font-size:.88rem; margin:4px 0 18px}
  .tag{font-size:.62rem; letter-spacing:.1em; text-transform:uppercase; color:var(--violet);
    border:1px solid var(--line-soft); border-radius:6px; padding:2px 7px; white-space:nowrap}

  .field{margin-bottom:18px}
  .field:last-child{margin-bottom:0}
  label.q{display:block; font-size:.95rem; color:var(--ink); margin-bottom:8px}
  label.q .req{color:var(--gold); margin-left:2px}
  label.q .sub{display:block; color:var(--muted); font-size:.82rem; margin-top:3px; font-weight:400}
  label.q b{color:var(--gold)}

  input[type=text],input[type=email],input[type=tel],textarea{
    width:100%; background:var(--field-bg); border:1px solid var(--field-border);
    border-radius:11px; color:var(--ink); font:inherit; font-size:.96rem; padding:11px 13px; transition:border-color .2s, box-shadow .2s}
  textarea{resize:vertical; min-height:74px}
  input:focus,textarea:focus{outline:none; border-color:var(--gold); box-shadow:0 0 0 3px rgba(245,193,92,.14)}
  input::placeholder,textarea::placeholder{color:var(--muted); opacity:.75}

  .checks{display:grid; gap:10px}
  .check{display:flex; align-items:flex-start; gap:11px; background:var(--field-bg);
    border:1px solid var(--field-border); border-radius:11px; padding:12px 14px; cursor:pointer; transition:.2s}
  .check:hover{border-color:var(--gold)}
  .check input{accent-color:var(--gold); width:18px; height:18px; margin-top:2px; flex:none}
  .check span{font-size:.95rem}
  .repeat-note{font-size:.82rem; color:var(--cyan); background:color-mix(in srgb, var(--cyan) 12%, transparent);
    border:1px solid color-mix(in srgb, var(--cyan) 40%, transparent); border-radius:9px; padding:9px 12px; margin-bottom:16px}

  /* purpose note — explains where an answer ends up */
  .purpose{font-size:.85rem; color:var(--cyan); background:color-mix(in srgb,var(--cyan) 9%, transparent);
    border-left:3px solid color-mix(in srgb,var(--cyan) 55%, transparent); border-radius:0 9px 9px 0;
    padding:9px 13px; margin:0 0 16px}

  /* repeatable entry cards (work / projects) */
  .entry{position:relative; border:1px dashed var(--field-border); border-radius:12px;
    padding:18px 16px 4px; margin-bottom:14px; background:color-mix(in srgb,var(--field-bg) 55%, transparent)}
  .entry-title{font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); margin-bottom:14px}
  .entry-title b{color:var(--ink)}
  .entry-remove{position:absolute; top:10px; right:10px; width:28px; height:28px; border-radius:999px; cursor:pointer;
    background:var(--field-bg); border:1px solid var(--field-border); color:var(--muted); font-size:.78rem; line-height:1; transition:.2s}
  .entry-remove:hover{border-color:#e05555; color:#e05555}
  .add-btn{display:inline-flex; align-items:center; gap:8px; font:inherit; font-size:.9rem; font-weight:600; cursor:pointer;
    color:var(--gold); background:var(--field-bg); border:1px dashed var(--gold); border-radius:11px; padding:11px 18px; transition:.2s}
  .add-btn:hover{background:color-mix(in srgb,var(--gold) 12%, transparent); transform:translateY(-1px)}

  .submit-row{margin-top:30px; text-align:center}
  .warn{max-width:44ch; margin:0 auto 18px; padding:12px 16px; font-size:.9rem; line-height:1.45;
    color:var(--ink); background:color-mix(in srgb, var(--gold) 14%, transparent);
    border:1px solid var(--line); border-radius:12px}
  button.send{font:inherit; font-size:1.02rem; font-weight:600; color:#1a1206; cursor:pointer;
    background:linear-gradient(180deg,var(--accent-soft),var(--gold)); border:none;
    padding:15px 44px; border-radius:999px; letter-spacing:.02em;
    box-shadow:0 14px 34px -12px rgba(245,193,92,.55); transition:transform .15s, box-shadow .15s}
  button.send:hover{transform:translateY(-2px); box-shadow:0 20px 40px -12px rgba(245,193,92,.65)}
  button.send:disabled{opacity:.6; cursor:wait; transform:none}
  .privacy{color:var(--muted); font-size:.8rem; margin-top:14px}

  #done{display:none; text-align:center; padding:70px 20px}
  #done .mark{font-size:3rem; color:var(--gold)}
  #done h2{font-family:Georgia,serif; font-weight:500; font-size:2rem; margin:.4em 0 .3em;
    background:linear-gradient(180deg,var(--ink),var(--accent-soft));-webkit-background-clip:text;background-clip:text;color:transparent}
  #done p{color:var(--ink-soft)}
  #err{display:none; color:#c0392b; background:rgba(255,80,80,.1); border:1px solid rgba(255,80,80,.3);
    border-radius:11px; padding:14px 16px; margin-top:18px; font-size:.9rem; text-align:center}
  #err a{color:var(--gold)}

  #totop{position:fixed; right:16px; bottom:16px; z-index:44; width:46px; height:46px; border-radius:999px;
    border:1px solid var(--line); background:linear-gradient(180deg,var(--accent-soft),var(--gold)); color:#1a1206;
    font-size:1.2rem; cursor:pointer; display:none; place-items:center; box-shadow:0 12px 28px -10px rgba(0,0,0,.6)}
  #totop.show{display:grid}

  footer{text-align:center; color:var(--muted); font-size:.8rem; margin-top:40px}
  footer .name{color:var(--gold); letter-spacing:.05em}

  /* ── тихая полоска-подпись: связывает публичные страницы между собой ── */
  .sitenav{margin:34px 0 0; padding:18px 0 0; display:flex; flex-wrap:wrap; align-items:center;
    gap:10px 22px; border-top:1px solid var(--line-soft); font-size:12.5px; line-height:1.7; text-align:left}
  .sitenav .sn-who{font-family:Georgia,"Times New Roman",serif; font-style:italic; font-size:14px;
    color:var(--ink-soft); white-space:nowrap}
  .sitenav .sn-links{display:flex; flex-wrap:wrap; align-items:center; gap:6px 18px; min-width:0}
  .sitenav a{color:var(--muted); text-decoration:none; border-bottom:1px solid transparent;
    transition:color .18s, border-color .18s}
  .sitenav a:hover{color:var(--gold); border-bottom-color:var(--line)}
  .sitenav .sn-here{color:var(--muted); opacity:.45}
</style>
</head>
<body>
<canvas id="starfield" aria-hidden="true"></canvas>
<div id="progress-wrap"><div id="progress"></div></div>

<div id="controls">
  <div class="grp" id="langs">
    <button class="langbtn" data-lang="ru">RU</button>
    <button class="langbtn active" data-lang="en">EN</button>
    <button class="langbtn" data-lang="pl">PL</button>
  </div>
  <button id="theme-btn" title="Светлая тема">☀</button>
</div>

<!-- side drawer -->
<button id="menu-btn"><span class="ico">☰</span><span data-i18n="ui.menu"></span></button>
<div id="drawer-backdrop"></div>
<aside id="drawer">
  <button id="drawer-close" aria-label="×">✕</button>
  <div id="drawer-head">
    <p class="dt" data-i18n="ui.menu"></p>
    <p class="dp" data-i18n="hero.hint"></p>
  </div>
  <nav id="drawer-nav"></nav>
</aside>

<div class="wrap">
  <form id="anketa" novalidate>
    <header class="hero">
      <span class="kicker">Portfolio · CV · LinkedIn</span>
      <h1 data-i18n="hero.h1"></h1>
      <p class="lede" data-i18n="hero.lede"></p>
      <p class="hint" data-i18n="hero.hint"></p>
    </header>

    <p class="warn" data-i18n="ui.warn"></p>

    <!-- 1 -->
    <section class="card" id="s1">
      <div class="sec-head"><span class="sec-num">1</span><h2 data-i18n="s1.title"></h2></div>
      <p class="sec-desc" data-i18n="s1.desc"></p>
      <div class="field">
        <label class="q" data-i18n="s1.q_order"></label>
        <div class="checks">
          <label class="check"><input type="checkbox" name="Заказ: Портфолио-сайт" value="да" data-reqgroup="Заказ"><span data-i18n="s1.opt1"></span></label>
          <label class="check"><input type="checkbox" name="Заказ: Короткое резюме" value="да" data-reqgroup="Заказ"><span data-i18n="s1.opt2"></span></label>
          <label class="check"><input type="checkbox" name="Заказ: Оформление LinkedIn" value="да" data-reqgroup="Заказ"><span data-i18n="s1.opt3"></span></label>
          <label class="check"><input type="checkbox" name="Заказ: Всё вместе" value="да" data-reqgroup="Заказ"><span data-i18n="s1.opt4"></span></label>
          <label class="check"><input type="checkbox" name="Заказ: High Pitch" value="да"><span data-i18n="s1.opt_hp"></span></label>
        </div>
      </div>
      <div class="field">
        <label class="q" data-i18n="s1.q_type"></label>
        <div class="checks">
          <label class="check"><input type="radio" name="Про человека или бизнес" value="Человек" data-reqgroup="Тип"><span data-i18n="s1.type_person"></span></label>
          <label class="check"><input type="radio" name="Про человека или бизнес" value="Бизнес" data-reqgroup="Тип"><span data-i18n="s1.type_business"></span></label>
        </div>
      </div>
      <div class="field"><label class="q" data-i18n="s1.q_goal"></label>
        <textarea name="Главная цель" data-i18n-ph="s1.goal_ph" data-req></textarea></div>
      <div class="field"><label class="q" data-i18n="s1.q_aud"></label>
        <textarea name="Кто будет читать" data-i18n-ph="s1.aud_ph" data-req></textarea></div>
      <div class="field"><label class="q" data-i18n="s1.q_deadline"></label>
        <input type="text" name="Срок или дата" data-i18n-ph="s1.deadline_ph"></div>
    </section>

    <!-- 2 -->
    <section class="card" id="s2">
      <div class="sec-head"><span class="sec-num">2</span><h2 data-i18n="s2.title"></h2><span class="tag" data-i18n="tag.all"></span></div>
      <p class="purpose" data-i18n="s2.purpose"></p>
      <div class="field"><label class="q" data-i18n="s2.q_name"></label><input type="text" name="Имя и фамилия" data-req></div>
      <div class="field"><label class="q" data-i18n="s2.q_loc"></label><input type="text" name="Город, страна, удалёнка" data-i18n-ph="s2.loc_ph" data-req></div>
      <div class="field"><label class="q" data-i18n="s2.q_contacts"></label><textarea name="Контакты" data-i18n-ph="s2.contacts_ph" data-req></textarea></div>
      <div class="field"><label class="q" data-i18n="s2.q_links"></label><textarea name="Ссылки и текущее резюме" data-i18n-ph="s2.links_ph"></textarea></div>
      <div class="field"><label class="q" data-i18n="s2.q_langs"></label><input type="text" name="Языки" data-i18n-ph="s2.langs_ph" data-req></div>
      <div class="field"><label class="q" data-i18n="s2.q_pos"></label><input type="text" name="Кто вы одной фразой" data-i18n-ph="s2.pos_ph" data-req></div>
    </section>

    <!-- 3 -->
    <section class="card" id="s3">
      <div class="sec-head"><span class="sec-num">3</span><h2 data-i18n="s3.title"></h2><span class="tag" data-i18n="tag.all"></span></div>
      <p class="purpose" data-i18n="s3.purpose"></p>
      <div id="exp-list">
        <div class="entry exp-entry">
          <button type="button" class="entry-remove" aria-label="remove">✕</button>
          <div class="entry-title"><span data-i18n="s3.entry"></span> <b class="entry-n">1</b></div>
          <div class="field"><label class="q" data-i18n="s3.q_name"></label><input type="text" data-name="Компания или проект" data-req data-reqfirst></div>
          <div class="field"><label class="q" data-i18n="s3.q_role"></label><input type="text" data-name="Должность, период, город" data-i18n-ph="s3.role_ph" data-req data-reqfirst></div>
          <div class="field"><label class="q" data-i18n="s3.q_ach"></label><textarea data-name="Главные результаты" style="min-height:96px" data-req data-reqfirst></textarea></div>
          <div class="field"><label class="q" data-i18n="s3.q_duties"></label><textarea data-name="Чем занимались"></textarea></div>
          <div class="field"><label class="q" data-i18n="s3.q_tools"></label><input type="text" data-name="Программы и инструменты"></div>
        </div>
      </div>
      <button type="button" class="add-btn" id="add-exp" data-i18n="ui.add_job"></button>
    </section>

    <!-- 4 -->
    <section class="card" id="s4">
      <div class="sec-head"><span class="sec-num">4</span><h2 data-i18n="s4.title"></h2><span class="tag" data-i18n="tag.all"></span></div>
      <p class="purpose" data-i18n="s4.purpose"></p>
      <div class="field"><label class="q" data-i18n="s4.q_edu"></label><textarea name="Образование"></textarea></div>
      <div class="field"><label class="q" data-i18n="s4.q_cert"></label><textarea name="Курсы, сертификаты, награды"></textarea></div>
      <div class="field"><label class="q" data-i18n="s4.q_skills"></label><textarea name="Главные навыки" data-i18n-ph="s4.skills_ph" data-req></textarea></div>
    </section>

    <!-- 5 (портфолио) -->
    <section class="card hidden" id="s5">
      <div class="sec-head"><span class="sec-num">5</span><h2 data-i18n="s5.title"></h2><span class="tag" data-i18n="tag.portfolio"></span></div>
      <p class="purpose" data-i18n="s5.purpose"></p>
      <p class="sec-desc" data-i18n="s5.desc"></p>
      <div id="proj-list">

 ru:["Заказ","Контакты","Опыт","Навыки","Проекты","Бизнес","Стиль","LinkedIn","Файлы"],

};
var SECTIONS = ['s1','s2','s3','s4','s5','s6','s7','s8','s9'];

/* ============ language ============ */
var lang = 'en';
function applyLang(l){
  lang = (T[l] ? l : 'en');
  document.documentElement.lang = lang;
  var dict = T[lang];
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    var v = dict[el.getAttribute('data-i18n')];
    if(v != null) el.innerHTML = v;
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(function(el){
    var v = dict[el.getAttribute('data-i18n-ph')];
    if(v != null) el.setAttribute('placeholder', v);
  });
  buildNav();
  document.querySelectorAll('.langbtn').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-lang')===lang); });
  try{ localStorage.setItem('anketa-lang', lang); }catch(e){}
  updateProgress();
}
document.querySelectorAll('.langbtn').forEach(function(b){
  b.addEventListener('click', function(){ applyLang(b.getAttribute('data-lang')); });
});

/* ============ theme ============ */
var themeBtn = document.getElementById('theme-btn');
function applyTheme(t){
  var lightOn = (t === 'light');
  document.body.classList.toggle('light', lightOn);
  themeBtn.textContent = lightOn ? '🌙' : '☀';
  themeBtn.title = lightOn ? 'Тёмная тема' : 'Светлая тема';
  try{ localStorage.setItem('anketa-theme', t); }catch(e){}
}
themeBtn.addEventListener('click', function(){
  applyTheme(document.body.classList.contains('light') ? 'dark' : 'light');
});

/* ============ side drawer nav ============ */
var drawer = document.getElementById('drawer');
var backdrop = document.getElementById('drawer-backdrop');
var navBox = document.getElementById('drawer-nav');
function openDrawer(){ drawer.classList.add('open'); backdrop.classList.add('open'); }
function closeDrawer(){ drawer.classList.remove('open'); backdrop.classList.remove('open'); }
document.getElementById('menu-btn').addEventListener('click', openDrawer);
document.getElementById('drawer-close').addEventListener('click', closeDrawer);
backdrop.addEventListener('click', closeDrawer);
document.addEventListener('keydown', function(e){ if(e.key === 'Escape') closeDrawer(); });

function buildNav(){
  navBox.innerHTML = '';
  SECTIONS.forEach(function(id, i){
    var sec = document.getElementById(id);
    if(sec.classList.contains('hidden')) return;
    var a = document.createElement('button');
    a.type = 'button'; a.className = 'navlink'; a.setAttribute('data-target', id);
    a.innerHTML = '<span class="navnum">' + (i+1) + '</span><span>' + NAV[lang][i] + '</span>';
    a.addEventListener('click', function(){
      closeDrawer();
      var t = document.getElementById(id);
      if(t) t.scrollIntoView({behavior:'smooth', block:'start'});
    });
    navBox.appendChild(a);
  });
}

/* swipe gestures: open by swiping right from left edge, close by swiping left */
var tsX = 0, tsY = 0;
document.addEventListener('touchstart', function(e){
  var t = e.touches[0]; tsX = t.clientX; tsY = t.clientY;
}, {passive:true});
document.addEventListener('touchend', function(e){
  var t = e.changedTouches[0];
  var dx = t.clientX - tsX, dy = t.clientY - tsY;
  if(Math.abs(dx) < 60 || Math.abs(dy) > Math.abs(dx)) return; // ignore vertical / small
  if(dx > 0 && tsX < 45 && !drawer.classList.contains('open')) openDrawer();
  else if(dx < 0 && drawer.classList.contains('open')) closeDrawer();
}, {passive:true});

/* highlight active section in drawer */
var io = new IntersectionObserver(function(entries){
  entries.forEach(function(e){
    if(e.isIntersecting){
      var id = e.target.id;
      navBox.querySelectorAll('.navlink').forEach(function(a){
        a.classList.toggle('active', a.getAttribute('data-target') === id);
      });
    }
  });
},{rootMargin:'-45% 0px -50% 0px'});
document.querySelectorAll('section.card').forEach(function(s){ io.observe(s); });

/* ============ conditional blocks ============ */
var form = document.getElementById('anketa');
function cb(name){ return form.querySelector('[name="'+name+'"]'); }
function applyConditional(){
  var all = cb('Заказ: Всё вместе');
  var pf  = cb('Заказ: Портфолио-сайт');
  var li  = cb('Заказ: Оформление LinkedIn');
  var biz = form.querySelector('[name="Про человека или бизнес"][value="Бизнес"]');
  var wantPf  = (pf && pf.checked) || (all && all.checked);
  var wantLi  = (li && li.checked) || (all && all.checked);
  var wantBiz = biz && biz.checked;
  document.getElementById('s5').classList.toggle('hidden', !wantPf);
  document.getElementById('s8').classList.toggle('hidden', !wantLi);
  document.getElementById('s6').classList.toggle('hidden', !wantBiz);
  buildNav();
  updateProgress();
}
form.addEventListener('change', applyConditional);

/* ============ progress (visible required singles + groups) ============ */
var bar = document.getElementById('progress');
var toTop = document.getElementById('totop');
function isVisible(el){ return el.offsetParent !== null; }
function reqSingles(){ return Array.prototype.slice.call(form.querySelectorAll('[data-req]')).filter(isVisible); }
function reqGroups(){
  var names = {};
  form.querySelectorAll('[data-reqgroup]').forEach(function(el){ if(isVisible(el)) names[el.getAttribute('data-reqgroup')] = true; });
  return Object.keys(names);
}
function groupFilled(name){
  return !!form.querySelector('[data-reqgroup="'+name+'"]:checked');
}
function updateProgress(){
  var singles = reqSingles(), groups = reqGroups();
  var filled = singles.filter(function(f){ return f.value.trim() !== ''; }).length
             + groups.filter(groupFilled).length;
  var total = singles.length + groups.length;
  bar.style.width = (total ? Math.round(filled/total*100) : 0) + '%';
}
form.addEventListener('input', updateProgress);
window.addEventListener('scroll', function(){ toTop.classList.toggle('show', window.scrollY > 500); });
toTop.addEventListener('click', function(){ window.scrollTo({top:0, behavior:'smooth'}); });

/* ============ repeatable entries (work + projects) ============ */
function translateWithin(root){
  var dict = T[lang];
  root.querySelectorAll('[data-i18n]').forEach(function(el){ var v=dict[el.getAttribute('data-i18n')]; if(v!=null) el.innerHTML=v; });
  root.querySelectorAll('[data-i18n-ph]').forEach(function(el){ var v=dict[el.getAttribute('data-i18n-ph')]; if(v!=null) el.setAttribute('placeholder',v); });
}
function refreshEntries(listId){
  var entries = document.getElementById(listId).querySelectorAll('.entry');
  entries.forEach(function(en,i){
    var n = en.querySelector('.entry-n'); if(n) n.textContent = (i+1);
    var rm = en.querySelector('.entry-remove'); if(rm) rm.style.display = entries.length>1 ? 'block' : 'none';
    en.querySelectorAll('[data-reqfirst]').forEach(function(f){
      if(i===0) f.setAttribute('data-req',''); else f.removeAttribute('data-req');
    });
  });
  updateProgress();
}
function bindRemoves(list){
  list.querySelectorAll('.entry-remove').forEach(function(btn){
    if(btn._bound) return; btn._bound = true;
    btn.addEventListener('click', function(){
      if(list.querySelectorAll('.entry').length <= 1) return;
      btn.closest('.entry').remove();
      refreshEntries(list.id); updateProgress();
    });
  });
}
function addEntry(listId){
  var list = document.getElementById(listId);
  var clone = list.querySelector('.entry').cloneNode(true);
  clone.querySelectorAll('input,textarea').forEach(function(f){ f.value=''; f.removeAttribute('data-req'); f.style.borderColor=''; });
  list.appendChild(clone);
  translateWithin(clone); bindRemoves(list); refreshEntries(listId); updateProgress();
  clone.scrollIntoView({behavior:'smooth', block:'center'});
}
function nameEntries(listId, prefix){
  document.getElementById(listId).querySelectorAll('.entry').forEach(function(en,i){
    en.querySelectorAll('[data-name]').forEach(function(f){ f.name = prefix+' '+(i+1)+': '+f.getAttribute('data-name'); });
  });
}
document.getElementById('add-exp').addEventListener('click', function(){ addEntry('exp-list'); });
document.getElementById('add-proj').addEventListener('click', function(){ addEntry('proj-list'); });
bindRemoves(document.getElementById('exp-list'));
bindRemoves(document.getElementById('proj-list'));
refreshEntries('exp-list'); refreshEntries('proj-list');

/* ============ submit → email via FormSubmit ============ */
var errBox = document.getElementById('err');
var btn = document.getElementById('send-btn');
var ENDPOINT = 'https://formsubmit.co/ajax/marcin.tatsiana@gmail.com';
form.addEventListener('submit', function(e){
  e.preventDefault();
  errBox.style.display = 'none';

  var missingSingles = reqSingles().filter(function(f){ return f.value.trim() === ''; });
  var missingGroups = reqGroups().filter(function(g){ return !groupFilled(g); });
  var missingCount = missingSingles.length + missingGroups.length;
  if(missingCount){
    var target = missingSingles[0];
    if(target){
      target.focus();
      target.scrollIntoView({behavior:'smooth', block:'center'});
      target.style.borderColor = '#e05555';
    } else {
      var g = form.querySelector('[data-reqgroup="'+missingGroups[0]+'"]');
      if(g) g.closest('section').scrollIntoView({behavior:'smooth', block:'start'});
    }
    errBox.textContent = T[lang]['err.required'] + missingCount;
    errBox.style.display = 'block';
    return;
  }

  nameEntries('exp-list', 'Опыт');
  nameEntries('proj-list', 'Проект');
  var nmEl = form.querySelector('[name="Имя и фамилия"]');
  var clientName = nmEl && nmEl.value.trim() ? nmEl.value.trim() : '';
  var data = { _subject:'📋 Новая анкета' + (clientName ? ' — ' + clientName : '') + ' · Tatsiana', _template:'table', _captcha:'false', 'Язык заполнения':lang.toUpperCase() };
  if(pickedLook){
    data['✦ Образ из Примерочной'] = LOOK_NAMES[pickedLook] + ' [' + pickedLook + ']';
    if(pickedMood && MOOD_NAMES[pickedMood]){ data['✦ Настроение образа'] = MOOD_NAMES[pickedMood]; }
    if(pickedTone){ data['✦ Оттенок акцента'] = pickedTone + '°'; }
  }
  var contEl = form.querySelector('[name="Контакты"]');
  var em = contEl && contEl.value.match(/[\w.+-]+@[\w-]+\.[\w.-]+/);
  if(em){ data._replyto = em[0]; }
  Array.prototype.forEach.call(form.elements, function(el){
    if(!el.name) return;
    if(el.type === 'checkbox'){ if(el.checked) data[el.name] = 'да'; }
    else if(el.type === 'radio'){ if(el.checked) data[el.name] = el.value; }
    else if(el.value.trim() !== ''){ data[el.name] = el.value.trim(); }
  });
  btn.disabled = true; btn.textContent = T[lang]['ui.sending'];
  fetch(ENDPOINT, { method:'POST', headers:{'Content-Type':'application/json','Accept':'application/json'}, body:JSON.stringify(data) })
    .then(function(r){ return r.json(); })
    .then(function(res){
      if(res.success === 'true' || res.success === true){
        form.style.display = 'none';
        document.getElementById('done').style.display = 'block';
        bar.style.width = '100%';
        window.scrollTo({top:0, behavior:'smooth'});
      } else { throw new Error('fail'); }
    })
    .catch(function(){
      btn.disabled = false; btn.textContent = T[lang]['ui.submit'];
      errBox.innerHTML = T[lang]['err.fail'] + '<a href="mailto:marcin.tatsiana@gmail.com">marcin.tatsiana@gmail.com</a>.';
      errBox.style.display = 'block';
    });
});

/* ============ образ из «Примерочной» (fitting-room.html) ============
   Посетитель выбирает образ на витрине и приходит сюда по ссылке вида
   ?look=emerald&tone=210&mood=calm — подхватываем и кладём в письмо,
   чтобы Татьяна сразу видела, какой стиль человек примерил. */
var LOOK_NAMES = {
  ultraneon:'Ultraneon (неон, космос)', midnight:'Midnight (строгий тёмный)',
  emerald:'Emerald (изумруд с золотом)', gilded:'Golden Hour (светлый пергамент)',
  warm:'Warm Minimal (белый с терракотой)', nordic:'Nord (холодный светлый)'
};
var MOOD_NAMES = { calm:'тише', base:'как задумано', vivid:'ярче' };
var pickedLook = null, pickedTone = null, pickedMood = null;

/* Если человек вписал имя на карточке в Примерочной — подставляем его
   в первое поле, чтобы не заставлять писать дважды. Только текст,
   в value, без вставки в разметку. */
function prefillName(q){
  var n = q.get('name');
  if(!n) return;
  n = n.trim().slice(0, 80);
  if(!n) return;
  var el = form.querySelector('[name="Имя и фамилия"]');
  if(el && el.value.trim() === ''){ el.value = n; }
}

function captureLook(){
  var q = null;
  try{ q = new URLSearchParams(window.location.search); }catch(e){ return; }
  prefillName(q);
  var l = q.get('look'), t = q.get('tone'), m = q.get('mood');
  /* пришёл с витрины — запоминаем; иначе достаём то, что запомнили раньше */
  if(l && LOOK_NAMES[l]){
    pickedLook = l;
    pickedTone = (t && /^\d{1,3}$/.test(t)) ? t : null;
    pickedMood = (m && MOOD_NAMES[m]) ? m : null;
    try{
      localStorage.setItem('anketa-look', pickedLook);
      if(pickedTone){ localStorage.setItem('anketa-tone', pickedTone); } else { localStorage.removeItem('anketa-tone'); }
      if(pickedMood){ localStorage.setItem('anketa-mood', pickedMood); } else { localStorage.removeItem('anketa-mood'); }
    }catch(e){}
  } else {
    try{
      var sv = localStorage.getItem('anketa-look');
      if(sv && LOOK_NAMES[sv]){
        pickedLook = sv;
        pickedTone = localStorage.getItem('anketa-tone');
        pickedMood = localStorage.getItem('anketa-mood');
      }
    }catch(e){}
  }
}

/* ============ init from storage ============ */
(function init(){
  var st=null, sl=null;
  try{ st = localStorage.getItem('anketa-theme'); sl = localStorage.getItem('anketa-lang'); }catch(e){}
  applyTheme(st === 'light' ? 'light' : 'dark');
  applyLang(sl && T[sl] ? sl : 'en');
  applyConditional();
  captureLook();
})();
</script>

<script>
/* ✦ Static golden starry sky — drawn once, no animation */
(function(){
  var c = document.getElementById('starfield'); if(!c) return;
  var ctx = c.getContext('2d');
  var DPR = Math.min(window.devicePixelRatio || 1, 2), W = 0, H = 0;
  function draw(){
    W = window.innerWidth; H = window.innerHeight;
    c.width = W*DPR; c.height = H*DPR; c.style.width = W+'px'; c.style.height = H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    ctx.clearRect(0,0,W,H);
    var n = Math.round(W*H/2500); // dense, real-sky scatter
    for(var i=0;i<n;i++){
      var x = Math.random()*W, y = Math.random()*H, t = Math.random();
      // mostly tiny & faint, a few bigger & brighter — like a real sky
      var rad = t<0.80 ? Math.random()*0.7+0.35 : (t<0.96 ? Math.random()*0.6+0.9 : Math.random()*0.7+1.5);
      var op  = t<0.80 ? Math.random()*0.30+0.12 : (t<0.96 ? Math.random()*0.30+0.38 : Math.random()*0.25+0.6);
      ctx.beginPath();
      ctx.arc(x, y, rad, 0, 6.2832);
      ctx.fillStyle = (Math.random()<0.14) ? 'rgba(255,245,220,'+op+')' : 'rgba(244,200,108,'+op+')';
      ctx.fill();
    }
  }
  draw();
  window.addEventListener('resize', draw);
})();
</script>
